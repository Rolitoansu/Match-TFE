name: match-tfe
services:
  postgres:
    container_name: database-matchtfe
    image: postgres:18-alpine
    restart: always
    ports:
      - "${DB_PORT}:${DB_PORT}"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - match_network

  db-init:
    container_name: dbinit-matchtfe
    build:
      context: .
      dockerfile: ./userservice/Dockerfile
      target: development
    command: ["sh", "-c", "pnpm --filter @match-tfe/db db:push"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - match_network

  db-seed:
    container_name: dbseed-matchtfe
    image: postgres:18-alpine
    profiles:
      - seed
    command:
      - sh
      - -c
      - PGPASSWORD="$DB_PASSWORD" psql -h postgres -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -f /seed/init.sql
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - ./init.sql:/seed/init.sql:ro
    networks:
      - match_network

  authservice:
    container_name: authservice-matchtfe
    build:
      context: .
      dockerfile: ./authservice/Dockerfile
      target: development
    develop:
      watch:
        - action: rebuild
          path: ./authservice/package.json

        - action: rebuild
          path: ./database/package.json

        - action: sync
          path: ./authservice
          target: /usr/src/authservice
          ignore:
            - node_modules

        - action: sync
          path: ./database
          target: /usr/src/database
          ignore:
            - node_modules
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - match_network
    env_file:
      - .env
  
  userservice:
    container_name: userservice-matchtfe
    build:
      context: .
      dockerfile: ./userservice/Dockerfile
      target: development
    develop:
      watch:
        - action: rebuild
          path: ./userservice/package.json

        - action: rebuild
          path: ./database/package.json

        - action: sync
          path: ./userservice
          target: /usr/src/userservice
          ignore:
            - node_modules

        - action: sync
          path: ./database
          target: /usr/src/database
          ignore:
            - node_modules
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - match_network
    env_file:
      - .env
  projectservice:
    container_name: projectservice-matchtfe
    build:
      context: .
      dockerfile: ./projectservice/Dockerfile
      target: development
    develop:
      watch:
        - action: rebuild
          path: ./projectservice/package.json

        - action: rebuild
          path: ./database/package.json

        - action: sync
          path: ./projectservice
          target: /usr/src/projectservice
          ignore:
            - node_modules

        - action: sync
          path: ./database
          target: /usr/src/database
          ignore:
            - node_modules
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - match_network
    env_file:
      - .env
  notificationservice:
    container_name: notificationservice-matchtfe
    build:
      context: .
      dockerfile: ./notificationservice/Dockerfile
      target: development
    develop:
      watch:
        - action: rebuild
          path: ./notificationservice/package.json

        - action: rebuild
          path: ./database/package.json

        - action: sync
          path: ./notificationservice
          target: /usr/src/notificationservice
          ignore:
            - node_modules

        - action: sync
          path: ./database
          target: /usr/src/database
          ignore:
            - node_modules
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - match_network
    env_file:
      - .env
  gatewayservice:
    container_name: gatewayservice-matchtfe
    build:
      context: ./gatewayservice
      dockerfile: ./Dockerfile
      target: development
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: rebuild
          path: ./gatewayservice/package.json

        - action: sync
          path: ./gatewayservice
          target: /usr/src/gatewayservice
          ignore:
            - node_modules
    depends_on:
      - db-init
      - authservice
      - projectservice
      - notificationservice
      - postgres
    networks:
      - match_network
    env_file:
      - .env

  webapp:
    container_name: webapp-matchtfe
    build:
      context: .
      dockerfile: ./webapp/Dockerfile
      target: development
    develop:
      watch:
        - action: rebuild
          path: ./webapp/package.json
        
        - action: sync
          path: ./webapp
          target: /app
          ignore:
            - node_modules
    ports:
      - "3000:3000"
    networks:
      - match_network
    env_file:
      - .env

networks:
  match_network:
    driver: bridge

volumes:
  postgres_data:
    name: match_tfe_postgres_data