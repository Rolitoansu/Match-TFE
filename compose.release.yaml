name: match-tfe-release

services:
  postgres:
    container_name: database-matchtfe-release
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT}:${DB_PORT}"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_release:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - match_network_release

  db-init:
    container_name: dbinit-matchtfe-release
    build:
      context: .
      dockerfile: ./userservice/Dockerfile
      target: release
    command: ["sh", "-c", "pnpm --filter @match-tfe/db db:push"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - match_network_release

  db-seed:
    container_name: dbseed-matchtfe-release
    image: postgres:18-alpine
    command:
      - sh
      - -c
      - PGPASSWORD="$DB_PASSWORD" psql -h postgres -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -f /seed/init.sql
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - ./init.sql:/seed/init.sql:ro
    networks:
      - match_network_release

  authservice:
    container_name: authservice-matchtfe-release
    build:
      context: .
      dockerfile: ./authservice/Dockerfile
      target: release
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      db-seed:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      STAGE: production
      PORT: 5000
    env_file:
      - .env
    networks:
      - match_network_release

  userservice:
    container_name: userservice-matchtfe-release
    build:
      context: .
      dockerfile: ./userservice/Dockerfile
      target: release
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      db-seed:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      STAGE: production
      PORT: 5001
    env_file:
      - .env
    networks:
      - match_network_release

  projectservice:
    container_name: projectservice-matchtfe-release
    build:
      context: .
      dockerfile: ./projectservice/Dockerfile
      target: release
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      db-seed:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      STAGE: production
      PORT: 5002
    env_file:
      - .env
    networks:
      - match_network_release

  notificationservice:
    container_name: notificationservice-matchtfe-release
    build:
      context: .
      dockerfile: ./notificationservice/Dockerfile
      target: release
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      db-seed:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      STAGE: production
      PORT: 5004
    env_file:
      - .env
    networks:
      - match_network_release

  gatewayservice:
    container_name: gatewayservice-matchtfe-release
    build:
      context: ./gatewayservice
      dockerfile: ./Dockerfile
      target: release
    restart: unless-stopped
    depends_on:
      - db-init
      - db-seed
      - authservice
      - userservice
      - projectservice
      - notificationservice
    ports:
      - "127.0.0.1:${GATEWAY_BIND_PORT:-8000}:8000"
    environment:
      NODE_ENV: production
      STAGE: production
      PORT: 8000
    env_file:
      - .env
    networks:
      - match_network_release

  webapp:
    container_name: webapp-matchtfe-release
    build:
      context: .
      dockerfile: ./webapp/Dockerfile
      target: release
      args:
        VITE_PUBLIC_API_URL: ${VITE_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - gatewayservice
    ports:
      - "127.0.0.1:${WEBAPP_BIND_PORT:-3000}:80"
    networks:
      - match_network_release

networks:
  match_network_release:
    driver: bridge

volumes:
  postgres_data_release:
    name: match_tfe_postgres_data_release
