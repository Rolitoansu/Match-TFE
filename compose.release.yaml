name: match-tfe-release

services:
  postgres:
    container_name: database-matchtfe-release
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT}:${DB_PORT}"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_release:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - match_network_release

  authservice:
    container_name: authservice-matchtfe-release
    build:
      context: .
      dockerfile: ./authservice/Dockerfile
      target: release
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      STAGE: production
      PORT: 5000
    env_file:
      - .env
    networks:
      - match_network_release

  userservice:
    container_name: userservice-matchtfe-release
    build:
      context: .
      dockerfile: ./userservice/Dockerfile
      target: release
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      STAGE: production
      PORT: 5001
    env_file:
      - .env
    networks:
      - match_network_release

  projectservice:
    container_name: projectservice-matchtfe-release
    build:
      context: .
      dockerfile: ./projectservice/Dockerfile
      target: release
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      STAGE: production
      PORT: 5002
    env_file:
      - .env
    networks:
      - match_network_release

  notificationservice:
    container_name: notificationservice-matchtfe-release
    build:
      context: .
      dockerfile: ./notificationservice/Dockerfile
      target: release
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      STAGE: production
      PORT: 5004
    env_file:
      - .env
    networks:
      - match_network_release

  gatewayservice:
    container_name: gatewayservice-matchtfe-release
    build:
      context: ./gatewayservice
      dockerfile: ./Dockerfile
      target: release
    restart: unless-stopped
    depends_on:
      - authservice
      - userservice
      - projectservice
      - notificationservice
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-8000}:8000"
    environment:
      NODE_ENV: production
      STAGE: production
      PORT: 8000
      GATEWAY_PORT: 8000
    env_file:
      - .env
    networks:
      - match_network_release

  webapp:
    container_name: webapp-matchtfe-release
    build:
      context: .
      dockerfile: ./webapp/Dockerfile
      target: release
      args:
        VITE_HOST: ${VITE_HOST:-http://localhost}
        VITE_API_GATEWAY_PORT: ${VITE_API_GATEWAY_PORT:-8000}
    restart: unless-stopped
    depends_on:
      - gatewayservice
    ports:
      - "127.0.0.1:${WEBAPP_PORT:-3000}:80"
    networks:
      - match_network_release

networks:
  match_network_release:
    driver: bridge

volumes:
  postgres_data_release:
